apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-app-ingress
  namespace: user-app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test-nginx
                port:
                  number: 80
